# Production compose for a VPS running Traefik as a reverse proxy.
#
# Prerequisites on the VPS:
#   - Traefik running with an HTTPS entrypoint named "websecure"
#     and a Let's Encrypt cert resolver named "letsencrypt"
#   - A Docker network named "traefik-public" shared with Traefik
#   - A .env file with all required variables (see .env.example)
#
# Deploy:
#   docker compose --env-file .env -f docker-compose.prod.yml pull
#   docker compose --env-file .env -f docker-compose.prod.yml up -d

# Lock the project name so the volume is always "techscribe-studio_techscribe-data"
# regardless of what directory this file is run from. Changing this would orphan
# existing data — do not rename without migrating the volume first.
name: techscribe-studio

services:
  techscribe-studio:
    image: ghcr.io/${GITHUB_REPOSITORY:-siddonj/techscribe-studio}:${IMAGE_TAG:-latest}
    restart: unless-stopped

    networks:
      - traefik-public

    # Load all secrets/config from .env; override infrastructure-only vars inline.
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "8989"
      HOSTNAME: "0.0.0.0"
      DATA_DIR: /app/data

    volumes:
      - ./data:/app/data   # SQLite database lives on the host — survives any docker command

    # Writable scratch space for Next.js fetch cache and OS temp files.
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /app/.next/cache:size=128m,uid=1001,gid=1001

    # ── Security hardening ───────────────────────────────────────────────────
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - >-
          require('http')
            .get({path:'/api/healthz',port:8989,timeout:8000},
                 (r) => process.exit(r.statusCode === 200 ? 0 : 1))
            .on('error', () => process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # ── Resource limits ──────────────────────────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

    # ── Traefik labels ───────────────────────────────────────────────────────
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # HTTP → HTTPS redirect
      - "traefik.http.routers.techscribe-http.rule=Host(`${DOMAIN:-techscribe.example.com}`)"
      - "traefik.http.routers.techscribe-http.entrypoints=web"
      - "traefik.http.routers.techscribe-http.middlewares=redirect-to-https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      # HTTPS router
      - "traefik.http.routers.techscribe.rule=Host(`${DOMAIN:-techscribe.example.com}`)"
      - "traefik.http.routers.techscribe.entrypoints=websecure"
      - "traefik.http.routers.techscribe.tls=true"
      - "traefik.http.routers.techscribe.tls.certresolver=letsencrypt"
      # Service backend port
      - "traefik.http.services.techscribe.loadbalancer.server.port=8989"
      # Disable response buffering so streaming AI generation works correctly
      - "traefik.http.middlewares.techscribe-buffering.buffering.maxResponseBodyBytes=0"
      - "traefik.http.routers.techscribe.middlewares=techscribe-buffering"

networks:
  traefik-public:
    external: true

# No named volumes — data lives at ./data on the host.
