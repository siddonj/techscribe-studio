# Lock the project name so the volume is always "techscribe-studio_techscribe-data"
# regardless of what directory this file is run from. Changing this would orphan
# existing data — do not rename without migrating the volume first.
name: techscribe-studio

services:
  techscribe-studio:
    build:
      context: .
      dockerfile: Dockerfile
    image: techscribe-studio:local

    # Load all secrets/config from .env; override infrastructure-only vars inline.
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: "8989"
      HOSTNAME: "0.0.0.0"
      DATA_DIR: /app/data

    ports:
      - "8989:8989"

    volumes:
      - techscribe-data:/app/data   # SQLite database — persists across container restarts

    # Writable scratch space for Next.js fetch cache and OS temp files.
    # These are in-memory and discarded on container stop.
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /app/.next/cache:size=128m,uid=1001,gid=1001

    restart: unless-stopped

    # ── Resource limits ──────────────────────────────────────────────────────
    mem_limit: 1g
    cpus: "1.0"

    # ── Security hardening ───────────────────────────────────────────────────
    read_only: true               # container filesystem is immutable at runtime
    security_opt:
      - no-new-privileges:true    # prevent setuid/setgid privilege escalation
    cap_drop:
      - ALL                       # drop every Linux capability …
    # cap_add: []                 # … none needed: port 8989 > 1024, no raw sockets

    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - >-
          require('http')
            .get({path:'/api/healthz',port:8989,timeout:8000},
                 (r) => process.exit(r.statusCode === 200 ? 0 : 1))
            .on('error', () => process.exit(1))
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s


volumes:
  techscribe-data:
    name: techscribe-data
    driver: local
    # WARNING: never run "docker compose down -v" — the -v flag deletes this
    # volume and all history/settings data with it. Use "docker compose down"
    # (no -v) to stop and remove containers while keeping data intact.
